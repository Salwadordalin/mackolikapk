<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor ve Fikstür Portalı - Maçkolik Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f11;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        /* Koyu tema renkleri */
        .bg-dark-primary {
            background-color: #121214;
        }

        .bg-dark-secondary {
            background-color: #1a1a1d;
        }

        .bg-dark-tertiary {
            background-color: #2a2a2e;
        }

        .text-light {
            color: #e0e0e0;
        }

        .text-muted {
            color: #a0a0a0;
        }

        /* Canlı dakika animasyonu - yeşil yanıp sönen */
        @keyframes liveMinutePulse {
            0% {
                background-color: #10b981;
                box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
            }
            50% {
                background-color: #059669;
                box-shadow: 0 0 20px rgba(16, 185, 129, 0.8);
            }
            100% {
                background-color: #10b981;
                box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
            }
        }

        .live-badge {
            animation: liveMinutePulse 1.5s ease-in-out infinite;
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            color: white;
            font-size: 14px;
        }

        /* Gol animasyonu - kırmızı flash ve çerçeve */
        @keyframes goalFlash {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
                border: 3px solid rgba(239, 68, 68, 0.9);
            }
            50% {
                box-shadow: 0 0 30px 15px rgba(239, 68, 68, 0.5);
                border: 3px solid rgba(239, 68, 68, 1);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
                border: 3px solid rgba(239, 68, 68, 0);
            }
        }

        .goal-animation {
            animation: goalFlash 3s ease-out 1;
        }

        /* Scroll smooth */
        html {
            scroll-behavior: smooth;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1d;
        }

        ::-webkit-scrollbar-thumb {
            background: #404045;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #505055;
        }

        /* Tab animasyonu */
        .tab-button {
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            padding-bottom: 12px;
        }

        .tab-button.active {
            border-bottom-color: #3b82f6;
            color: #3b82f6;
        }

        /* Filter button stili */
        .filter-btn {
            transition: all 0.3s ease;
            border: 2px solid #404045;
        }

        .filter-btn.active {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        /* Accordion animasyonu */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out;
        }

        .accordion-content.open {
            max-height: 500px;
        }

        /* Match Card Hover */
        .match-card {
            transition: all 0.3s ease;
        }

        .match-card:hover {
            transform: translateY(-4px);
        }

        /* Badge stilleri */
        .badge-yellow {
            display: inline-block;
            width: 18px;
            height: 18px;
            background-color: #fbbf24;
            border-radius: 3px;
            margin-right: 4px;
        }

        .badge-red {
            display: inline-block;
            width: 18px;
            height: 18px;
            background-color: #ef4444;
            border-radius: 3px;
            margin-right: 4px;
        }

        .badge-goal {
            font-size: 16px;
            margin-right: 4px;
        }

        /* Loading spinner */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #404045;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Error notifikasyon */
        .error-banner {
            background-color: #dc2626;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-banner.hidden {
            display: none;
        }

        /* Success notifikasyon */
        .success-banner {
            background-color: #059669;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Grid fikstür */
        .fixture-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        @media (max-width: 768px) {
            .fixture-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Team logo stili */
        .team-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            background-color: #2a2a2e;
            border-radius: 4px;
            padding: 4px;
        }

        /* Badge lig adı */
        .league-badge {
            display: inline-block;
            background-color: #3b82f6;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
        }
    </style>
</head>
<body class="bg-dark-primary">
    <div class="min-h-screen flex flex-col">
        <header class="bg-dark-secondary border-b border-gray-700 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-light">⚽ Maçkolik Pro</h1>
                        <p class="text-muted text-sm mt-1">Canlı Skor ve Fikstür Portalı</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div id="updateIndicator" class="flex items-center gap-2 text-muted text-sm">
                            <div class="spinner"></div>
                            <span>Güncelleniyor...</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div id="errorBanner" class="error-banner hidden">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            <span id="errorMessage">Veri akışı şu an durduruldu, yeniden bağlanılıyor...</span>
        </div>

        <div class="bg-dark-secondary border-b border-gray-700">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex gap-8">
                    <button id="tabLiveScores" class="tab-button active py-4 font-semibold text-light">
                        🔴 Canlı Skorlar
                    </button>
                    <button id="tabFixtures" class="tab-button py-4 font-semibold text-muted">
                        📅 Sezon Fikstürü
                    </button>
                </div>
            </div>
        </div>

        <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
            <section id="liveScorerSection" class="space-y-6">
                <div class="flex flex-wrap gap-3">
                    <button id="filterAll" class="filter-btn active px-6 py-2 rounded-lg font-semibold text-light">
                        Hepsi
                    </button>
                    <button id="filterSuperLig" class="filter-btn px-6 py-2 rounded-lg font-semibold text-light">
                        🇬🇧 Premier Lig
                    </button>
                    <button id="filterAmberLig" class="filter-btn px-6 py-2 rounded-lg font-semibold text-light">
                        🇪🇸 La Liga
                    </button>
                </div>

                <div id="matchesContainer" class="space-y-4">
                    <div class="text-center py-12">
                        <div class="spinner mx-auto mb-4"></div>
                        <p class="text-muted">Maçlar yükleniyor...</p>
                    </div>
                </div>
            </section>

            <section id="fixturesSection" class="hidden space-y-6">
                <div id="fixturesContainer" class="fixture-grid">
                    <div class="text-center py-12 col-span-full">
                        <div class="spinner mx-auto mb-4"></div>
                        <p class="text-muted">Sezon fikstürü yükleniyor...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // ===== KONFIGÜRASYON =====
        const API_TOKEN = '6f59243d57ff41c3985f3475ebd45259';
        // GitHub Pages üzerinde CORS bloklamasını aşmak için en kararlı proxy yapısı
        const PROXY_URL = 'https://api.allorigins.win/get?url=';
        const TARGET_URL = 'https://api.football-data.org/v4/matches';

        // ===== STATE YÖNETİMİ =====
        let currentTab = 'liveScores';
        let currentFilter = 'all';
        let previousScores = new Map();
        let updateIntervalId = null;
        let cachedMatches = [];

        // ===== DOM ELEMENTLERİ =====
        const tabLiveScoresBtn = document.getElementById('tabLiveScores');
        const tabFixturesBtn = document.getElementById('tabFixtures');
        const liveScorerSection = document.getElementById('liveScorerSection');
        const fixturesSection = document.getElementById('fixturesSection');
        const matchesContainer = document.getElementById('matchesContainer');
        const fixturesContainer = document.getElementById('fixturesContainer');
        const filterAllBtn = document.getElementById('filterAll');
        const filterSuperLigBtn = document.getElementById('filterSuperLig');
        const filterAmberLigBtn = document.getElementById('filterAmberLig');
        const errorBanner = document.getElementById('errorBanner');
        const errorMessage = document.getElementById('errorMessage');
        const updateIndicator = document.getElementById('updateIndicator');

        // ===== DATA FETCH FONKSİYONU =====
        async function fetchAllData() {
            try {
                updateIndicator.style.opacity = '1';
                
                // GitHub üzerinden güvenli ve başlık kısıtlamasız tek bir istek atıyoruz
                const response = await fetch(`${PROXY_URL}${encodeURIComponent(TARGET_URL)}`, {
                    headers: {
                        'X-Auth-Token': API_TOKEN
                    }
                });

                if (!response.ok) throw new Error('Proxy yanıt vermedi.');

                const baseData = await response.json();
                // AllOrigins proxy veriyi string olarak döndüğü için parse ediyoruz
                const data = JSON.parse(baseData.contents);
                
                if (data && data.matches) {
                    cachedMatches = data.matches;
                    hideErrorBanner();
                }
            } catch (error) {
                console.error('Veri Çekme Hatası:', error);
                showErrorBanner('API kota sınırına takıldı veya proxy yoğun. Yeniden deneniyor...');
            } finally {
                updateIndicator.style.opacity = '0.4';
            }
        }

        function showErrorBanner(message) {
            errorMessage.textContent = message;
            errorBanner.classList.remove('hidden');
        }

        function hideErrorBanner() {
            errorBanner.classList.add('hidden');
        }

        // ===== MAÇLARI LİSTELE (TAB 1) =====
        async function loadLiveScores() {
            if (cachedMatches.length === 0) {
                await fetchAllData();
            }
            
            renderProcessedMatches(cachedMatches);
        }

        function renderProcessedMatches(matches) {
            // Sadece Premier Lig (PL) ve La Liga (PD) maçlarını filtrele
            let displayMatches = matches.filter(match => {
                const code = match.competition?.code;
                return code === 'PL' || code === 'PD';
            });

            // Seçili filtre butonuna göre daralt
            if (currentFilter === 'superLig') {
                displayMatches = displayMatches.filter(m => m.competition?.code === 'PL');
            } else if (currentFilter === 'premierLig') {
                displayMatches = displayMatches.filter(m => m.competition?.code === 'PD');
            }

            if (displayMatches.length === 0) {
                matchesContainer.innerHTML = '<p class="text-center text-muted py-8">Bugün bu liglerde oynanan veya planlanan maç bulunmuyor.</p>';
                return;
            }

            // Tarihe göre sırala
            displayMatches.sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));

            matchesContainer.innerHTML = displayMatches.map(match => createMatchCard(match)).join('');

            displayMatches.forEach(match => {
                const card = document.querySelector(`.match-card[data-match-id="${match.id}"]`);
                if (card) {
                    card.addEventListener('click', () => toggleAccordion(match.id));
                }
            });
        }

        // ===== MATCH CARD TASARIMI =====
        function createMatchCard(match) {
            const homeTeam = match.homeTeam;
            const awayTeam = match.awayTeam;
            
            const homeScore = match.score?.fullTime?.home ?? 0;
            const awayScore = match.score?.fullTime?.away ?? 0;
            
            let status = match.status;
            const isLive = ['LIVE', 'IN_PLAY', 'PAUSED'].includes(status);
            const leagueName = match.competition?.name || 'Lig';

            const matchKey = `match_${match.id}`;
            const previousScore = previousScores.get(matchKey);
            const scoreChanged = previousScore && (previousScore.home !== homeScore || previousScore.away !== awayScore);

            previousScores.set(matchKey, { home: homeScore, away: awayScore });

            const htmlContent = `
                <div class="match-card bg-dark-secondary rounded-lg overflow-hidden cursor-pointer hover:bg-dark-tertiary transition-all" 
                     data-match-id="${match.id}" 
                     ${scoreChanged ? 'id="goal-flash-' + match.id + '"' : ''}>
                    
                    <div class="px-6 py-3 bg-dark-tertiary flex justify-between items-center border-b border-gray-700">
                        <div class="flex items-center gap-2">
                            <span class="league-badge">${leagueName}</span>
                            <span class="text-xs text-muted">${formatMatchTime(match.utcDate)}</span>
                        </div>
                        <span class="text-xs text-muted px-2 py-1 bg-dark-primary rounded">
                            ${status === 'FINISHED' ? 'Bitti' : (status === 'TIMED' ? 'Başlamadı' : 'Canlı')}
                        </span>
                    </div>

                    <div class="px-6 py-6 flex items-center justify-between">
                        <div class="text-center min-w-[60px]">
                            <div class="${isLive ? 'live-badge' : 'bg-dark-tertiary px-3 py-1.5 rounded text-sm text-muted font-semibold'}">
                                ${isLive ? '⏱️ Canlı' : (status === 'FINISHED' ? '🏁 MS' : '📅')}
                            </div>
                        </div>

                        <div class="flex-1 mx-6 text-center">
                            <div class="flex items-center justify-center gap-3 mb-4">
                                <img src="${homeTeam?.crest || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22%3E%3Crect fill=%22%23404045%22 width=%2240%22 height=%2240%22/%3E%3C/svg%3E'}" 
                                     alt="${homeTeam?.name}" class="team-logo">
                                <span class="font-semibold text-light max-w-xs truncate">${homeTeam?.shortName || homeTeam?.name ?? 'Ev Sahibi'}</span>
                            </div>

                            <div class="text-4xl font-bold text-light my-4">
                                <span>${homeScore}</span>
                                <span class="text-muted text-2xl"> - </span>
                                <span>${awayScore}</span>
                            </div>

                            <div class="flex items-center justify-center gap-3 mt-4">
                                <span class="font-semibold text-light max-w-xs truncate">${awayTeam?.shortName || awayTeam?.name ?? 'Deplasman'}</span>
                                <img src="${awayTeam?.crest || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22%3E%3Crect fill=%22%23404045%22 width=%2240%22 height=%2240%22/%3E%3C/svg%3E'}" 
                                     alt="${awayTeam?.name}" class="team-logo">
                            </div>
                        </div>

                        <div class="min-w-[60px]"></div>
                    </div>

                    <div class="accordion-content" data-match-id="${match.id}">
                        <div class="px-6 py-4 bg-dark-primary border-t border-gray-700">
                            <h3 class="font-semibold text-light mb-2">Maç Bilgisi</h3>
                            <p class="text-muted text-sm">Hafta: ${match.matchday || '-'} | Durum: ${status}</p>
                        </div>
                    </div>
                </div>
            `;

            if (scoreChanged && isLive) {
                setTimeout(() => {
                    const element = document.getElementById(`goal-flash-${match.id}`);
                    if (element) element.classList.add('goal-animation');
                }, 100);
            }

            return htmlContent;
        }

        // ===== ACCORDION TOGGLE =====
        function toggleAccordion(matchId) {
            const accordionContent = document.querySelector(`.accordion-content[data-match-id="${matchId}"]`);
            if (accordionContent) accordionContent.classList.toggle('open');
        }

        // ===== TAB SWITCHER =====
        function switchTab(tab) {
            currentTab = tab;

            if (tab === 'liveScores') {
                liveScorerSection.classList.remove('hidden');
                fixturesSection.classList.add('hidden');
                tabLiveScoresBtn.classList.add('active');
                tabFixturesBtn.classList.remove('active');
                tabLiveScoresBtn.classList.remove('text-muted');
                tabFixturesBtn.classList.add('text-muted');
                loadLiveScores();
            } else {
                liveScorerSection.classList.add('hidden');
                fixturesSection.classList.remove('hidden');
                tabLiveScoresBtn.classList.remove('active');
                tabFixturesBtn.classList.add('active');
                tabLiveScoresBtn.classList.add('text-muted');
                tabFixturesBtn.classList.remove('text-muted');
                loadFixtures();
            }
        }

        // ===== FİLTRE YÖNETİMİ =====
        function setFilter(filter) {
            currentFilter = filter;

            filterAllBtn.classList.toggle('active', filter === 'all');
            filterSuperLigBtn.classList.toggle('active', filter === 'superLig');
            filterAmberLigBtn.classList.toggle('active', filter === 'premierLig');

            if (currentTab === 'liveScores') {
                loadLiveScores();
            } else {
                loadFixtures();
            }
        }

        // ===== SEZON FİKSTÜRÜ (TAB 2) =====
        async function loadFixtures() {
            fixturesContainer.innerHTML = '<div class="text-center py-12 col-span-full"><div class="spinner mx-auto mb-4"></div><p class="text-muted">Fikstür yükleniyor...</p></div>';
            
            if (cachedMatches.length === 0) {
                await fetchAllData();
            }

            let fixtures = cachedMatches.filter(fixture => {
                const code = fixture.competition?.code;
                return (code === 'PL' || code === 'PD') && fixture.status === 'TIMED';
            });

            if (currentFilter === 'superLig') {
                fixtures = fixtures.filter(m => m.competition?.code === 'PL');
            } else if (currentFilter === 'premierLig') {
                fixtures = fixtures.filter(m => m.competition?.code === 'PD');
            }

            fixtures.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

            if (fixtures.length === 0) {
                fixturesContainer.innerHTML = '<p class="text-center text-muted py-8 col-span-full">Gelecek planlanmış maç bulunmuyor.</p>';
                return;
            }

            fixturesContainer.innerHTML = fixtures.slice(0, 12).map(fixture => createFixtureCard(fixture)).join('');
        }

        function createFixtureCard(fixture) {
            const homeTeam = fixture.homeTeam;
            const awayTeam = fixture.awayTeam;
            const leagueName = fixture.competition?.name || 'Lig';
            const formattedDate = formatMatchTime(fixture.utcDate);

            return `
                <div class="bg-dark-secondary rounded-lg overflow-hidden hover:bg-dark-tertiary transition-all">
                    <div class="px-4 py-3 bg-dark-tertiary flex justify-between items-center border-b border-gray-700">
                        <span class="league-badge">${leagueName}</span>
                        <span class="text-xs text-muted">${formattedDate}</span>
                    </div>

                    <div class="px-4 py-6 text-center">
                        <div class="flex items-center justify-center gap-3 mb-4">
                            <img src="${homeTeam?.crest || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22%3E%3Crect fill=%22%23404045%22 width=%2232%22 height=%2232%22/%3E%3C/svg%3E'}" 
                                 alt="${homeTeam?.name}" class="team-logo" style="width: 32px; height: 32px;">
                            <span class="font-semibold text-light text-sm truncate">${homeTeam?.shortName || homeTeam?.name ?? 'Ev Sahibi'}</span>
                        </div>

                        <div class="text-2xl font-bold text-muted my-2">VS</div>

                        <div class="flex items-center justify-center gap-3 mt-4">
                            <span class="font-semibold text-light text-sm truncate">${awayTeam?.shortName || awayTeam?.name ?? 'Deplasman'}</span>
                            <img src="${awayTeam?.crest || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22%3E%3Crect fill=%22%23404045%22 width=%2232%22 height=%2232%22/%3E%3C/svg%3E'}" 
                                 alt="${awayTeam?.name}" class="team-logo" style="width: 32px; height: 32px;">
                        </div>
                    </div>
                </div>
            `;
        }

        // ===== YARDIMCI FONKSİYONLAR =====
        function formatMatchTime(utcString) {
            if (!utcString) return 'Saat Bilinmiyor';
            const date = new Date(utcString);
            return date.toLocaleString('tr-TR', { 
                day: '2-digit', 
                month: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        // ===== EVENT LİSTENER'LAR =====
        tabLiveScoresBtn.addEventListener('click', () => switchTab('liveScores'));
        tabFixturesBtn.addEventListener('click', () => switchTab('fixtures'));

        filterAllBtn.addEventListener('click', () => setFilter('all'));
        filterSuperLigBtn.addEventListener('click', () => setFilter('superLig'));
        filterAmberLigBtn.addEventListener('click', () => setFilter('premierLig'));

        // ===== BAŞLATMA VE AUTO-LOOP =====
        function startUpdateInterval() {
            loadLiveScores();

            if (updateIntervalId) {
                clearInterval(updateIntervalId);
            }

            // API istek sınırını (Dakikada 10) korumak için 35 saniyede bir tetikliyoruz
            updateIntervalId = setInterval(async () => {
                await fetchAllData();
                if (currentTab === 'liveScores') {
                    loadLiveScores();
                } else {
                    loadFixtures();
                }
            }, 35000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            startUpdateInterval();
        });

        window.addEventListener('beforeunload', () => {
            if (updateIntervalId) clearInterval(updateIntervalId);
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (updateIntervalId) {
                    clearInterval(updateIntervalId);
                    updateIntervalId = null;
                }
            } else {
                startUpdateInterval();
            }
        });
    </script>
</body>
</html>
